<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(to bottom right, #fbeee6, #f7d9c4);
        text-align: center;
        color: #5a3e36;
    }

    .card {
        max-width: 600px;
        margin: 50px auto;
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
        font-size: 32px;
        margin-bottom: 10px;
    }

    .names {
        font-size: 28px;
        font-weight: bold;
        margin: 20px 0;
        color: #b76e79;
    }

    .section {
        margin: 20px 0;
        font-size: 18px;
    }

    .highlight {
        font-weight: bold;
    }

    .footer {
        margin-top: 30px;
        font-style: italic;
    }
</style>
</head>

<body>

<div class="card">
    <h1>💖 Wedding Invitation 💖</h1>

    <p>With love and joy, we invite you to celebrate the wedding of</p>

    <div class="names">
        Arun <br> & <br> Jaiseetha
    </div>

    <div class="section">
        <span class="highlight">Wedding</span><br>
        June 25th, Thursday<br>
        7:30 AM – 9:00 AM
    </div>

    <div class="section">
        <span class="highlight">Reception</span><br>
        June 24th, Wednesday<br>
        7:00 PM onwards
    </div>

    <div class="section">
        <span class="highlight">Venue</span><br>
        12/6, Chokkapanai Ln,<br>
        Thirubuvanam, Tamil Nadu
    </div>

    <div class="footer">
        We look forward to celebrating with you ❤️
    </div>
</div>

</body>
</html>
